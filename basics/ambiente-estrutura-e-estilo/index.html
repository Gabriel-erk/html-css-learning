<!-- tag html (html, head, body...) == marcaćões, pois html é uma linguagem de MARCAĆÃO, logo, eu preciso marcar (com as tags de marcaćão == tags html) meu arquivo com as tags html para que meu navegador que tipo de informaćão é aquela (titulo principal (h1) subtitulo (h2), parágrafo (p) e  etc...) -->

<!-- linha abaixo qual o tipo de documento que estamos escrevendo (!DOCTYPE), que é o html que vem logo após o !DOCTYPE, caso estivessemos escrevendo outro tipo de documento poderiamos especificar tambem, como, por ex: !DOCTYPE css e etc -->
<!DOCTYPE html>
<html lang="en">
<!-- todo arquivo html é dividido em 2 partes: cabeća (head) e corpo (body) -->
<!-- todas as informaćões presentes no head são informaćões mais relevantes para o NAVEGADOR, logo, não necessariamente tudo que colocarmos aqui, vai ficar vísivel para quem estiver usando nosso site, um exemplo: import de fontes não fica visível para os usuários do site, apenas o que FAZEMOS com aquele import, mas aquela linha de import em si, ninguém sabe que ela existe, apenas o código e o navegador, agora, um ex de algo que é vísível: nossa tag html title, que mostra na aba do navegador o nome da página (talvesz a única coisa vísivel para o usuário que está presente nesta tag head também ) -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- sobre as explicaćões das primeiras linhas, o texto abaixo Document é um TITULO, pois está envolto da tag html/marcaćão de título -->
    <!-- tudo entre as tags de abertura e fechamento abaixo (title) será considerado um title (titulo), ou seja, aparecerá na guia do nosso site -->
    <title>Meu primeiro site!</title>
</head>
<!-- na segunga parte do arquivo html, nosso corpo (body) vai tudo que o usuário poderá ver, textos, imagens, links...tudo isso ele será capaz de VER, todo CONTEÚDO do sistema está dentro da tag body -->

<body>
    <!-- heading titles (titulos de cabećalho, essas coisas), possuindo 6 nívei de importância, sendo o 1 a maior importância e o 6 a menor importância (é assim que o navegador vai compreender) -->
    <h1>Hello World!</h1>
</body>

</html>
